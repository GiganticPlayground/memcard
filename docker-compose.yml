services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: false
    develop:
      watch:
        - action: rebuild
          path: ./src
        - action: rebuild
          path: ./api
        - action: rebuild
          path: ./package.json
        - action: rebuild
          path: ./yarn.lock
        - action: rebuild
          path: ./tsconfig.json
        - action: rebuild
          path: ./Dockerfile
    container_name: memcard
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
